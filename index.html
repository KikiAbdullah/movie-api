<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie & Series Manager</title>
    <link rel="stylesheet" href="style.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.css">
    <!-- Optional: Add Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <h1>Movie & Series Manager</h1>
        <nav>
            <button id="show-movies"><i class="fas fa-film"></i> Movies</button>
            <button id="show-series"><i class="fas fa-tv"></i> Series</button>
            <button id="add-new"><i class="fas fa-plus-circle"></i> Add New</button>
            <a href="https://movie-api-eedc1-default-rtdb.asia-southeast1.firebasedatabase.app/movies.json" target="_blank" class="nav-link-btn"><i class="fas fa-link"></i> JSON Movies URL</a>
            <a href="https://movie-api-eedc1-default-rtdb.asia-southeast1.firebasedatabase.app/series.json" target="_blank" class="nav-link-btn"><i class="fas fa-link"></i> JSON Series URL</a>
        </nav>
    </header>

    <main>
        <section id="movie-list" class="content-section">
            <h2>Movies</h2>
            <table id="movies-table" class="display">
                <thead>
                    <tr>
                        <th>Poster</th>
                        <th>Title</th>
                        <th>Synopsis</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>

        <section id="series-list" class="content-section" style="display:none;">
            <h2>Series</h2>
            <table id="series-table" class="display">
                <thead>
                    <tr>
                        <th>Poster</th>
                        <th>Title</th>
                        <th>Synopsis</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>

        <!-- Add/Edit Form Modal -->
        <div id="item-form-modal" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2>Add/Edit Item</h2>
                <form id="item-form">
                    <input type="hidden" id="item-id">

                    <div class="form-group">
                        <label for="item-type">Type:</label>
                        <select id="item-type" required>
                            <option value="movies">Movie</option>
                            <option value="series">Series</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="item-title">Title:</label>
                        <input type="text" id="item-title" required>
                    </div>

                    <div class="form-group">
                        <label for="item-poster-url">Poster URL:</label>
                        <input type="url" id="item-poster-url">
                    </div>

                    <div class="form-group">
                        <label for="item-synopsis">Synopsis:</label>
                        <textarea id="item-synopsis"></textarea>
                    </div>

                    <div id="movie-streams-section" class="form-section">
                        <h3>Streams (Movies)</h3>
                        <div id="movie-streams-container" class="dynamic-fields-container"></div>
                        <button type="button" id="add-movie-stream" class="add-field-button"><i class="fas fa-plus"></i> Add Stream</button>
                    </div>

                    <div id="series-episodes-section" class="form-section" style="display:none;">
                        <h3>Episodes (Series)</h3>
                        <div id="series-episodes-container" class="dynamic-fields-container"></div>
                        <button type="button" id="add-series-episode" class="add-field-button"><i class="fas fa-plus"></i> Add Episode</button>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="save-button"><i class="fas fa-save"></i> Save</button>
                        <button type="button" id="cancel-form" class="cancel-button"><i class="fas fa-times"></i> Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- jQuery (required for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- DataTables JS -->
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.js"></script>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
